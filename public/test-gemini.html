<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Router - Tester Multimodal (Estable)</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; margin: 20px; max-width: 1000px; background: #f9fafb; }
    .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    select, input, textarea { width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; border-radius: 8px; border: 1px solid #ccc; }
    button { padding: 12px 24px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; margin-right: 10px; }
    .btn-send { background: #10b981; color: white; }
    .btn-clear { background: #ef4444; color: white; }
    #output { border: 1px solid #ddd; padding: 20px; min-height: 400px; background: #f8fafc; white-space: pre-wrap; line-height: 1.6; border-radius: 10px; margin-top: 15px; }
    .success { color: #10b981; font-weight: bold; }
    .error { color: #ef4444; font-weight: bold; }
    label { font-weight: 600; margin-top: 12px; display: block; }
    #imageDrop { border: 3px dashed #10b981; padding: 40px; text-align: center; border-radius: 12px; background: #f0fdf4; min-height: 200px; }
    #imagePreview { max-width: 100%; max-height: 350px; margin: 15px auto; border-radius: 8px; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🤖 AI Router - Tester Multimodal (Versión Estable)</h1>

    <label>Proveedor:</label>
    <select id="provider">
      <option value="gemini">Gemini (Google)</option>
      <option value="groq">Groq (Llama 4 Scout)</option>
    </select>

    <label>Modelo:</label>
    <select id="model">
      <option value="gemini-2.5-flash">gemini-2.5-flash</option>
      <option value="meta-llama/llama-4-scout-17b-16e-instruct">llama-4-scout</option>
    </select>

    <label>API Key:</label>
    <input type="password" id="apiKey" placeholder="Tu API Key">

    <label>Mensaje:</label>
    <textarea id="message" rows="3">Extrae todos los valores importantes del Open Interest visible en esta imagen (máximos, mínimos, neto, tendencias).</textarea>

    <label>Imagen (CTRL + V o arrastra):</label>
    <div id="imageDrop">
      <p>Pega imagen con CTRL + V o arrastra aquí</p>
      <img id="imagePreview" alt="Preview">
    </div>

    <div style="margin-top: 20px;">
      <button class="btn-clear" onclick="clearImage()">🗑️ Limpiar imagen</button>
      <button class="btn-send" onclick="sendMessage()">🚀 Enviar a IA</button>
    </div>

    <h2>Respuesta:</h2>
    <div id="output">Listo...</div>
  </div>

  <script>
    let currentImageBase64 = null;
    const endpoint = "https://ai-router-psi.vercel.app/api/chat";

    function setupImagePaste() {
      const drop = document.getElementById("imageDrop");
      document.addEventListener('paste', e => {
        if (e.clipboardData.files[0]?.type.startsWith('image/')) {
          handleFile(e.clipboardData.files[0]);
        }
      });
      drop.addEventListener('drop', e => {
        e.preventDefault();
        if (e.dataTransfer.files[0]?.type.startsWith('image/')) handleFile(e.dataTransfer.files[0]);
      });
      drop.addEventListener('dragover', e => e.preventDefault());
    }

    function handleFile(file) {
      const reader = new FileReader();
      reader.onload = e => {
        currentImageBase64 = e.target.result;
        document.getElementById("imagePreview").src = currentImageBase64;
        document.getElementById("imagePreview").style.display = "block";
      };
      reader.readAsDataURL(file);
    }

    function clearImage() {
      currentImageBase64 = null;
      document.getElementById("imagePreview").style.display = "none";
    }

    async function sendMessage() {
      const provider = document.getElementById("provider").value;
      const model = document.getElementById("model").value;
      const apiKey = document.getElementById("apiKey").value.trim();
      const text = document.getElementById("message").value.trim();
      const output = document.getElementById("output");

      if (!apiKey) return output.innerHTML = '<span class="error">❌ Ingresa API Key</span>';
      if (!currentImageBase64) return output.innerHTML = '<span class="error">❌ Pega una imagen</span>';

      output.innerHTML = '<span class="success">Enviando...</span><br>';

      // Versión simple y estable que funcionaba antes
      const body = {
        provider,
        apiKey,
        model,
        messages: [{
          role: "user",
          content: text || "Analiza esta imagen y extrae la información del Open Interest",
          image: currentImageBase64   // ← Formato simple que el backend debe manejar
        }]
      };

      try {
        const res = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });

        if (!res.ok) {
          const err = await res.text();
          output.innerHTML += `<span class="error">Error: ${err}</span>`;
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        output.innerHTML = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value, { stream: true });
          const lines = chunk.split('\n');
          for (const line of lines) {
            if (line.startsWith("data: ")) {
              try {
                const data = JSON.parse(line.substring(6));
                if (data.chunk) {
                  output.innerHTML += data.chunk.replace(/\n/g, '<br>');
                  output.scrollTop = output.scrollHeight;
                }
              } catch(e) {}
            }
          }
        }
        output.innerHTML += '<br><br><span class="success">✅ Completado</span>';
      } catch (e) {
        output.innerHTML += `<br><span class="error">Error de conexión: ${e.message}</span>`;
      }
    }

    window.onload = setupImagePaste;
  </script>
</body>
</html>
