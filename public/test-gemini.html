<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Router - Prueba de Visión</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; margin: 20px; background: #f9fafb; }
    .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 6px 25px rgba(0,0,0,0.1); }
    input, button { padding: 12px 20px; font-size: 16px; border-radius: 8px; margin: 8px 0; }
    button { border: none; cursor: pointer; font-weight: 600; }
    .btn-clear { background: #ef4444; color: white; }
    .btn-send { background: #10b981; color: white; }
    #output { 
      border: 1px solid #ddd; 
      padding: 25px; 
      min-height: 480px; 
      background: #f8fafc; 
      white-space: pre-wrap; 
      line-height: 1.7; 
      border-radius: 12px; 
      margin-top: 20px;
      font-size: 15.8px;
    }
    #imageDrop {
      border: 3px dashed #10b981;
      padding: 50px 20px;
      text-align: center;
      border-radius: 12px;
      background: #f0fdf4;
      min-height: 260px;
      margin: 15px 0;
      transition: all 0.3s;
    }
    #imageDrop:hover { background: #ecfdf5; }
    #imagePreview { max-width: 100%; max-height: 420px; margin-top: 15px; border-radius: 10px; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
    .status { font-weight: bold; color: #166534; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 Prueba de Visión - AI Router</h1>

    <label><strong>API Key:</strong></label>
    <input type="password" id="apiKey" placeholder="Pega tu API Key aquí" style="width: 100%;">

    <label><strong>Imagen (CTRL + V o arrastra aquí):</strong></label>
    <div id="imageDrop">
      <p><strong>📸 Pega la imagen aquí con CTRL + V</strong><br>o arrastra la imagen desde tu escritorio</p>
      <img id="imagePreview" alt="Vista previa de la imagen">
    </div>

    <div>
      <button class="btn-clear" onclick="clearImage()">🗑️ Limpiar Imagen</button>
      <button class="btn-send" onclick="sendToAI()">🚀 Enviar Imagen al Modelo</button>
    </div>

    <h2>Respuesta del modelo:</h2>
    <div id="output">Esperando que pegues una imagen y presiones "Enviar Imagen al Modelo"...<br><br>Prueba primero con Gemini.</div>
  </div>

  <script>
    let currentImageBase64 = null;
    const endpoint = "https://ai-router-psi.vercel.app/api/chat";

    // Configurar pegar y arrastrar imagen
    function setupDropZone() {
      const dropZone = document.getElementById("imageDrop");

      document.addEventListener('paste', (e) => {
        const file = e.clipboardData.files[0];
        if (file && file.type.startsWith('image/')) {
          loadImage(file);
        }
      });

      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '#15803d';
      });

      dropZone.addEventListener('dragleave', () => {
        dropZone.style.borderColor = '#10b981';
      });

      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '#10b981';
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) {
          loadImage(file);
        }
      });
    }

    function loadImage(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        currentImageBase64 = e.target.result;
        const preview = document.getElementById("imagePreview");
        preview.src = currentImageBase64;
        preview.style.display = "block";
      };
      reader.readAsDataURL(file);
    }

    function clearImage() {
      currentImageBase64 = null;
      document.getElementById("imagePreview").style.display = "none";
    }

    async function sendToAI() {
      const apiKey = document.getElementById("apiKey").value.trim();
      const output = document.getElementById("output");

      if (!apiKey) {
        output.innerHTML = '<span style="color:red">❌ Por favor ingresa tu API Key</span>';
        return;
      }
      if (!currentImageBase64) {
        output.innerHTML = '<span style="color:red">❌ Primero pega una imagen con CTRL + V</span>';
        return;
      }

      output.innerHTML = '<span class="status">Enviando imagen al modelo...</span><br><br>';

      const body = {
        provider: "gemini",   // Cambia manualmente a "groq" si quieres probar el otro
        apiKey: apiKey,
        model: "gemini-2.5-flash",
        messages: [{
          role: "user",
          content: "Analiza esta imagen con atención. Extrae todos los valores del Open Interest que observes: máximos, mínimos, neto, cambios importantes, tendencias y cualquier patrón relevante.",
          image: currentImageBase64
        }]
      };

      try {
        const res = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });

        if (!res.ok) {
          const errorText = await res.text();
          output.innerHTML += `<span style="color:red">Error: ${errorText}</span>`;
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        output.innerHTML = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) {
            output.innerHTML += '<br><br><strong>✅ Análisis completado</strong>';
            break;
          }

          const chunk = decoder.decode(value, { stream: true });
          const lines = chunk.split('\n');

          for (const line of lines) {
            if (line.startsWith("data: ")) {
              try {
                const data = JSON.parse(line.substring(6));
                if (data.chunk) {
                  output.innerHTML += data.chunk.replace(/\n/g, '<br>');
                  output.scrollTop = output.scrollHeight;
                }
              } catch (e) {}
            }
          }
        }
      } catch (err) {
        output.innerHTML += `<br><span style="color:red">Error de conexión: ${err.message}</span>`;
      }
    }

    window.onload = setupDropZone;
  </script>
</body>
</html>
