<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Router Tester</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; margin: 20px; max-width: 900px; }
    select, input, textarea { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; border-radius: 6px; border: 1px solid #ccc; }
    button { 
      padding: 12px 24px; 
      font-size: 16px; 
      background: #10b981; 
      color: white; 
      border: none; 
      border-radius: 6px; 
      cursor: pointer; 
      font-weight: 600;
    }
    button:hover { background: #059669; }
    #output { 
      border: 1px solid #ddd; 
      padding: 18px; 
      min-height: 350px; 
      background: #f8fafc; 
      white-space: pre-wrap; 
      font-size: 15.5px;
      line-height: 1.6;
      border-radius: 8px;
      margin-top: 10px;
    }
    .success { color: #10b981; font-weight: bold; }
    .error { color: #ef4444; font-weight: bold; }
    label { font-weight: 600; margin-top: 12px; display: block; }
  </style>
</head>
<body>
  <h1>🤖 AI Router - Tester de Streaming</h1>

  <label>Proveedor:</label>
  <select id="provider" onchange="updateModels()">
    <option value="groq">Groq (Llama)</option>
    <option value="gemini">Gemini (Google)</option>
    <option value="xai">xAI / Grok</option>
  </select>

  <label>Modelo:</label>
  <select id="model"></select>

  <label>API Key:</label>
  <input type="password" id="apiKey" placeholder="Pega tu API Key">

  <label>System Prompt (opcional):</label>
  <textarea id="systemPrompt" rows="2" placeholder="Eres un experto en programación web..."></textarea>

  <label>Mensaje:</label>
  <textarea id="message" rows="4">Dame un ejemplo práctico de cómo implementar streaming en una API Route de Next.js usando el App Router.</textarea>

  <button onclick="sendMessage()">🚀 Enviar con Streaming</button>

  <h2>Respuesta en tiempo real:</h2>
  <div id="output">Haz clic en Enviar para comenzar...</div>

  <script>
    const endpoint = "https://ai-router-psi.vercel.app/api/chat";

    const models = {
      groq: ["llama-3.3-70b-versatile", "llama-3.1-70b-versatile"],
      gemini: ["gemini-2.5-flash", "gemini-2.5-flash-lite", "gemini-2.5-pro"],
      xai: ["grok-beta"]
    };

    function updateModels() {
      const provider = document.getElementById("provider").value;
      const select = document.getElementById("model");
      select.innerHTML = "";
      models[provider].forEach(model => {
        const opt = document.createElement("option");
        opt.value = model;
        opt.textContent = model;
        select.appendChild(opt);
      });
    }

    async function sendMessage() {
      const provider = document.getElementById("provider").value;
      const model = document.getElementById("model").value;
      const apiKey = document.getElementById("apiKey").value.trim();
      const system = document.getElementById("systemPrompt").value.trim();
      const message = document.getElementById("message").value.trim();
      const output = document.getElementById("output");

      if (!apiKey) {
        output.innerHTML = '<span class="error">❌ Por favor ingresa tu API Key</span>';
        return;
      }

      output.innerHTML = '<span class="success">Conectando al proveedor...</span><br>';

      const body = {
        provider,
        apiKey,
        model,
        messages: [{ role: "user", content: message }]
      };
      if (system) body.systemPrompt = system;

      try {
        const res = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });

        if (!res.ok) {
          const errText = await res.text();
          output.innerHTML += `<span class="error">Error ${res.status}: ${errText}</span>`;
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        output.innerHTML = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) {
            output.innerHTML += '<br><br><span class="success">✅ Streaming completado</span>';
            break;
          }

          const chunk = decoder.decode(value, { stream: true });
          const lines = chunk.split('\n');

          for (const line of lines) {
            if (line.startsWith('data: ')) {
              try {
                const dataStr = line.substring(6).trim();
                if (!dataStr || dataStr === '[DONE]') continue;
                const data = JSON.parse(dataStr);

                if (data.chunk) {
                  output.innerHTML += data.chunk.replace(/\n/g, '<br>');
                  output.scrollTop = output.scrollHeight;
                } else if (data.error) {
                  output.innerHTML += `<br><span class="error">Error: ${data.error}</span>`;
                } else if (data.done) {
                  output.innerHTML += '<br><br><span class="success">✅ Respuesta completa recibida</span>';
                }
              } catch (e) {}
            }
          }
        }
      } catch (err) {
        output.innerHTML += `<br><span class="error">Error de conexión: ${err.message}</span>`;
      }
    }

    // Inicializar
    window.onload = () => {
      updateModels();
    };
  </script>
</body>
</html>
