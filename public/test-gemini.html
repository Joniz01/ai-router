<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Router - Prueba de Visión</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f9fafb; }
    .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    button { padding: 14px 28px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; margin-right: 10px; }
    .btn-send { background: #10b981; color: white; }
    .btn-clear { background: #ef4444; color: white; }
    #output { 
      border: 1px solid #ddd; 
      padding: 20px; 
      min-height: 500px; 
      background: #f8fafc; 
      white-space: pre-wrap; 
      font-size: 15.5px; 
      line-height: 1.7; 
      border-radius: 10px; 
      margin-top: 15px;
    }
    .status { font-weight: bold; margin: 10px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 Prueba de Visión - AI Router</h1>

    <p><strong>Proveedor actual:</strong> Gemini y Groq (prueba ambos)</p>

    <label>API Key:</label>
    <input type="password" id="apiKey" placeholder="Pega tu API Key" style="width:100%; padding:12px; margin-bottom:15px;">

    <div>
      <button class="btn-clear" onclick="clearImage()">🗑️ Limpiar Imagen</button>
      <button class="btn-send" onclick="sendToAI()">🚀 Enviar Imagen al Modelo</button>
    </div>

    <h2>Respuesta del modelo:</h2>
    <div id="output">Esperando respuesta...</div>
  </div>

  <script>
    let currentImageBase64 = null;
    const endpoint = "https://ai-router-psi.vercel.app/api/chat";

    // Cargar imagen pegada o arrastrada
    document.addEventListener('paste', e => {
      const file = e.clipboardData.files[0];
      if (file && file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = ev => {
          currentImageBase64 = ev.target.result;
          console.log("Imagen cargada, tamaño:", currentImageBase64.length);
        };
        reader.readAsDataURL(file);
      }
    });

    async function sendToAI() {
      const apiKey = document.getElementById("apiKey").value.trim();
      const output = document.getElementById("output");

      if (!apiKey) {
        output.innerHTML = '<span style="color:red">❌ Ingresa tu API Key</span>';
        return;
      }
      if (!currentImageBase64) {
        output.innerHTML = '<span style="color:red">❌ Primero pega una imagen con CTRL + V</span>';
        return;
      }

      output.innerHTML = '<span class="status">Enviando imagen al modelo...</span><br>';

      // Enviamos en formato simple (el que funcionaba antes)
      const body = {
        provider: "gemini",           // Cambia a "groq" para probar el otro
        apiKey: apiKey,
        model: "gemini-2.5-flash",
        messages: [{
          role: "user",
          content: "Analiza esta imagen con atención y extrae toda la información del Open Interest. Incluye valores máximos, mínimos, neto, tendencias y cualquier patrón que observes.",
          image: currentImageBase64
        }]
      };

      try {
        const res = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });

        if (!res.ok) {
          const err = await res.text();
          output.innerHTML += `<span style="color:red">Error ${res.status}: ${err}</span>`;
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();

        output.innerHTML = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) {
            output.innerHTML += '<br><br><strong>✅ Streaming finalizado</strong>';
            break;
          }

          const chunk = decoder.decode(value, { stream: true });
          const lines = chunk.split('\n');

          for (const line of lines) {
            if (line.startsWith("data: ")) {
              try {
                const dataStr = line.substring(6).trim();
                if (!dataStr) continue;
                const data = JSON.parse(dataStr);

                if (data.chunk) {
                  output.innerHTML += data.chunk;           // ← Aquí mostramos el texto que llega
                  output.scrollTop = output.scrollHeight;
                } else if (data.error) {
                  output.innerHTML += `<br><span style="color:red">Error: ${data.error}</span>`;
                }
              } catch (e) {
                // Ignorar líneas que no son JSON
              }
            }
          }
        }
      } catch (err) {
        output.innerHTML += `<br><span style="color:red">Error de conexión: ${err.message}</span>`;
      }
    }

    // Permitir pegar imagen incluso si el foco está en otro lugar
    window.onload = () => {
      console.log("Página cargada - CTRL + V para pegar imagen");
    };
  </script>
</body>
</html>
