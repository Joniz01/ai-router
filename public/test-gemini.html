<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Router - Prueba Multi-Proveedor</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.5; }
    #output { border: 1px solid #ddd; padding: 15px; min-height: 300px; background: #f8f9fa; white-space: pre-wrap; margin-top: 10px; font-size: 15px; }
    button { padding: 12px 20px; font-size: 16px; background: #4285f4; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #3367d6; }
    select, input, textarea { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; }
    .error { color: red; font-weight: bold; }
  </style>
</head>
<body>
  <h1>AI Router - Prueba Streaming (Gemini / Groq / Grok)</h1>

  <label><strong>Proveedor:</strong></label>
  <select id="provider" onchange="updateModels()">
    <option value="gemini">Gemini (Google)</option>
    <option value="groq">Groq (Llama)</option>
    <option value="xai">xAI / Grok</option>
  </select>

  <label><strong>Modelo:</strong></label>
  <select id="model"></select>

  <label><strong>API Key:</strong></label>
  <input type="password" id="apiKey" placeholder="Pega tu API Key aquí">

  <label><strong>System Prompt (opcional):</strong></label>
  <textarea id="systemPrompt" rows="2" placeholder="Eres un asistente útil y divertido..."></textarea>

  <label><strong>Mensaje:</strong></label>
  <textarea id="message" rows="4">Explica qué es Next.js y cómo funciona el streaming en API Routes.</textarea><br>

  <button onclick="sendMessage()">Enviar con Streaming</button>

  <h2>Respuesta en tiempo real:</h2>
  <div id="output">Esperando...</div>

  <script>
    const endpoint = "https://ai-router-psi.vercel.app/api/chat";

    const modelOptions = {
      gemini: ["gemini-2.5-flash", "gemini-2.5-flash-lite", "gemini-2.5-pro"],
      groq: ["llama-3.3-70b-versatile", "llama-3.1-70b-versatile", "mixtral-8x7b-32768"],
      xai: ["grok-beta"]
    };

    function updateModels() {
      const provider = document.getElementById("provider").value;
      const select = document.getElementById("model");
      select.innerHTML = "";
      modelOptions[provider].forEach(m => {
        const opt = document.createElement("option");
        opt.value = m;
        opt.textContent = m;
        select.appendChild(opt);
      });
    }

    async function sendMessage() {
      const provider = document.getElementById("provider").value;
      const model = document.getElementById("model").value;
      const apiKey = document.getElementById("apiKey").value.trim();
      const system = document.getElementById("systemPrompt").value.trim();
      const userMsg = document.getElementById("message").value.trim();
      const output = document.getElementById("output");

      if (!apiKey) {
        output.innerHTML = '<span class="error">❌ Ingresa tu API Key</span>';
        return;
      }

      output.innerHTML = "Conectando...<br>";

      const body = {
        provider: provider,
        apiKey: apiKey,
        model: model,
        messages: [{ role: "user", content: userMsg }]
      };

      if (system) {
        body.systemPrompt = system;
      }

      try {
        const res = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });

        if (!res.ok) {
          const err = await res.text();
          output.innerHTML += `<span class="error">Error ${res.status}: ${err}</span>`;
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        output.innerHTML = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) {
            output.innerHTML += "<br><br><strong>✅ Streaming finalizado</strong>";
            break;
          }

          const chunk = decoder.decode(value, { stream: true });
          const lines = chunk.split('\n');

          for (const line of lines) {
            if (line.startsWith("data: ")) {
              try {
                const data = JSON.parse(line.substring(6));
                if (data.chunk) {
                  output.innerHTML += data.chunk.replace(/\n/g, '<br>');
                  output.scrollTop = output.scrollHeight;
                } else if (data.error) {
                  output.innerHTML += `<br><span class="error">Error: ${data.error}</span>`;
                } else if (data.done) {
                  output.innerHTML += "<br><br><strong>✅ Respuesta completa</strong>";
                }
              } catch(e) {}
            }
          }
        }
      } catch (e) {
        output.innerHTML += `<br><span class="error">Error de conexión: ${e.message}</span>`;
      }
    }

    // Inicializar modelos
    window.onload = updateModels;
  </script>
</body>
</html>
